<style>

*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:Inter,sans-serif;overflow:hidden;height:100vh;touch-action:none;}
.mono{font-family:'JetBrains Mono',monospace;} .disp{font-family:'Space Grotesk',sans-serif;}
#canvas-container,#labels-container{position:absolute;inset:0;}
#labels-container{z-index:4;pointer-events:none;overflow:hidden;}
.html-label{position:absolute;pointer-events:none;transform:translate(-50%,-50%);transition:opacity .35s;white-space:nowrap;}
.planet-label{color:#fff;font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;text-shadow:0 0 12px rgba(0,0,0,.9);}
.mission-label{color:var(--accent);font-size:9px;font-weight:500;letter-spacing:1px;background:rgba(3,8,14,.55);padding:2px 7px;border:1px solid var(--line);border-radius:2px;}
.hud{position:absolute;inset:0;z-index:10;pointer-events:none;} .interactive{pointer-events:auto;}
.brand{position:absolute;top:22px;left:24px;cursor:pointer; display: flex; gap: 20px; align-items: center;}
.brand .eyebrow{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
.brand .title{font-size:1.3rem;font-weight:600;color:var(--text);} .brand .title span{color:var(--accent);}
.btn-arch{background:var(--panel); border:1px solid var(--line); padding:6px 12px; border-radius:2px; color:var(--accent); font-size:10px; letter-spacing:1px; text-transform:uppercase; cursor:pointer;}
#panel{position:absolute;top:0;right:0;height:100vh;width:320px;background:var(--panel);border-left:1px solid var(--line);backdrop-filter:blur(10px);display:flex;flex-direction:column;transition:transform .4s; z-index: 50;}
#panel.collapsed{transform:translateX(calc(100% - 30px));}
#panel-toggle{position:absolute;top:50%;left:-1px;transform:translateY(-50%);width:30px;height:54px;background:var(--panel);border:1px solid var(--line);border-right:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--accent);}
.panel-head{padding:22px 18px 14px;border-bottom:1px solid var(--line);}
.panel-list{flex:1;overflow-y:auto;padding:6px 0;} .panel-list::-webkit-scrollbar{width:0;}
.row{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;cursor:pointer;border-bottom:1px solid rgba(125,205,255,.06); text-decoration: none; color: var(--text);}
.row:hover{background:rgba(125,205,255,.05);} .row.active{background:rgba(125,205,255,.09);border-left:2px solid var(--accent);}
.row .rname{font-size:12.5px;font-weight:500;} .row .rtype{font-size:8.5px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
#mission-bar{position:absolute;bottom:0;left:0;right:320px;display:flex;border-top:1px solid var(--line);background:linear-gradient(to top,rgba(2,4,8,.85),rgba(2,4,8,0));}
.mcard{flex:1;padding:16px 18px 20px;border-right:1px solid var(--line);cursor:pointer;} .mcard:last-child{border-right:none;} .mcard:hover{background:rgba(125,205,255,.05);}
.mcard .num{font-size:9px;color:var(--amber);letter-spacing:2px;} .mcard .mtitle{font-size:12.5px;font-weight:600;margin-top:5px;} .mcard .msub{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.4;}

/* DIS-PLAY OVERLAY (Golden Seed & Fibonacci Explosion) */
#seed-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 20; pointer-events: auto; }
.golden-seed { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
.golden-seed::after { content: ''; width: 10px; height: 10px; background: var(--amber); border-radius: 50%; box-shadow: 0 0 20px 8px rgba(255,180,84,0.8); animation: pulse 2s infinite; }
@keyframes pulse{0%,100%{transform:scale(1); opacity:1;}50%{transform:scale(1.3); opacity:.7;}}
.fib-node { position: absolute; width: 46px; height: 46px; border-radius: 50%; background: rgba(6,11,20,0.9); border: 1px solid var(--line-b); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: auto; text-align: center; box-shadow: 0 0 15px rgba(94,234,212,0.2); }
.fib-node:hover { transform: scale(1.6) !important; background: var(--accent); color: #000; z-index: 100; border-color: #fff; }
.fib-node .tooltip { position: absolute; bottom: -24px; left: 50%; transform: translateX(-50%); font-size: 9px; color: var(--accent); white-space: nowrap; opacity: 0; transition: 0.2s; pointer-events: none; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;}
.fib-node:hover .tooltip { opacity: 1; bottom: -30px; }

/* SINGULARITY MODAL */
#singularity-modal { position: fixed; inset: 0; background: rgba(3,5,10,0.92); backdrop-filter: blur(16px); z-index: 1000; display: none; align-items: center; justify-content: center; }
#singularity-modal.active { display: flex; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.sing-card { background: var(--panel); border: 1px solid var(--line-b); padding: 32px; border-radius: 4px; max-width: 460px; width: 90%; text-align: center; }
.sing-card h2 { color: var(--accent); margin-bottom: 8px; font-size: 1.5rem; }
.sing-path { font-size: 10px; color: var(--muted); margin-bottom: 16px; letter-spacing: 1px; }
.sing-msg { font-size: 14px; line-height: 1.6; margin-bottom: 24px; color: var(--text); }
.sing-komute { display: block; background: var(--amber); color: #000; padding: 14px; text-decoration: none; font-weight: 700; border-radius: 2px; font-size: 14px; margin-bottom: 12px; }
.sing-amazon { display: block; background: transparent; border: 1px solid var(--line); color: var(--text); padding: 10px; text-decoration: none; font-size: 12px; border-radius: 2px; margin-bottom: 16px; }
.sing-close { background: none; border: 1px solid var(--line); color: var(--muted); padding: 8px 20px; cursor: pointer; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }

@media (max-width:760px){#panel{width:85vw;} #mission-bar{display:none;}}
</style>

const AMAZON_TAG = 'amazon0339f-21';

// ==========================================
// 2. DIS-PLAY ENGINE (Micro View & Accessibility)
// ==========================================
const DP = {
    isExploded: false,
    nodes: [],
    
    init() {
        document.getElementById('golden-seed').addEventListener('click', () => this.toggleSeed());
    },

    toggleSeed() {
        if(this.isExploded) {
            this.collapseSeed();
        } else {
            this.explodeSeed();
        }
    },

    explodeSeed() {
        this.isExploded = true;
        const container = document.getElementById('seed-container');
        document.getElementById('golden-seed').style.display = 'none';
        
        // Pick 12 random semantic nodes
        const keys = Object.keys(SEMANTIC_MESH);
        const selected = [];
        while(selected.length < 12) {
            const k = keys[Math.floor(Math.random() * keys.length)];
            if(!selected.includes(k)) selected.push(k);
        }

        selected.forEach((key, i) => {
            const angle = (i / 12) * Math.PI * 2;
            const radius = 120 + (i % 3) * 40; // Fibonacci-like spacing
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            
            const icons = ['🌱', '🌍', '🧠', '🤝', '🕊️', '🔥', '💧', '🎨', '🔭', '🏛️', '🧬', '🎵'];
            
            const node = document.createElement('div');
            node.className = 'fib-node';
            node.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(0)`;
            node.innerHTML = `${icons[i]}<div class="tooltip">${SEMANTIC_MESH[key]}</div>`;
            node.dataset.key = key;
            node.addEventListener('click', () => this.resolveSingularity(key));
            
            container.appendChild(node);
            this.nodes.push(node);
            
            // Animate in
            setTimeout(() => {
                node.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(1)`;
            }, i * 50);
        });
        
        this.speak("The semantic mesh is awake. Select a node to resolve your singularity.");
        if(navigator.vibrate) navigator.vibrate(50);
    },

    collapseSeed() {
        this.isExploded = false;
        this.nodes.forEach(n => n.remove());
        this.nodes = [];
        document.getElementById('golden-seed').style.display = 'flex';
    },

    resolveSingularity(key) {
        const concept = SEMANTIC_MESH[key];
        const path = key.split('.').map((k, i) => {
            const searchKey = key.split('.').slice(0, i+1).join('.');
            return SEMANTIC_MESH[searchKey] || k;
        }).join(' / ');

        // Generate Komute (Maps) Link
        const mapsQuery = encodeURIComponent(concept.replace(/_/g, ' ') + ' community center');
        const komuteUrl = `https://www.google.com/maps/search/${mapsQuery}`;
        
        // Generate Amazon Link
        const amzQuery = encodeURIComponent(concept.replace(/_/g, ' '));
        const amzUrl = `https://www.amazon.com/s?k=${amzQuery}&tag=${AMAZON_TAG}`;

        // Populate Modal
        document.getElementById('sing-path').innerText = path.toUpperCase();
        document.getElementById('sing-msg').innerText = `You have aligned with the frequency of "${concept.replace(/_/g, ' ')}". The physical mesh is calling. Walk to the nearest assembly point or gather the tools to begin.`;
        document.getElementById('sing-komute').href = komuteUrl;
        document.getElementById('sing-amazon').href = amzUrl;
        
        document.getElementById('singularity-modal').classList.add('active');
        
        // Speak the outcome
        this.speak(`Singularity resolved. You have aligned with ${concept.replace(/_/g, ' ')}. Opening coordinates.`);
        if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
    },

    closeSingularity() {
        document.getElementById('singularity-modal').classList.remove('active');
        this.collapseSeed();
    },

    showArchives() {
        const list = document.getElementById('panel-list');
        list.innerHTML = WIKI_ARCHIVES.map(w => `
            <a href="${w.url}" target="_blank" class="row">
                <div>
                    <div class="rname">${w.name}</div>
                    <div class="rtype">${w.cat}</div>
                </div>
                <div style="color:var(--accent);">↗</div>
            </a>
        `).join('');
        
        if(!A.s.panelOpen) A.togglePanel();
        this.speak("Earth Org Archives opened. 29 global networks available.");
    },

    speak(text) {
        if('speechSynthesis' in window) {
            speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.rate = 0.95; msg.pitch = 1; msg.volume = 0.8;
            speechSynthesis.speak(msg);
        }
    },

    listen() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!SR) {
            this.speak("Voice recognition not supported in this browser.");
            return;
        }
        const rec = new SR();
        rec.lang = 'en-US';
        rec.onstart = () => this.speak("Listening for your command.");
        rec.onresult = (e) => {
            const cmd = e.results[0][0].transcript.toLowerCase();
            if(cmd.includes('seed') || cmd.includes('roll') || cmd.includes('awaken')) this.explodeSeed();
            else if(cmd.includes('archive') || cmd.includes('wiki') || cmd.includes('earth org')) this.showArchives();
            else if(cmd.includes('close') || cmd.includes('collapse')) this.collapseSeed();
            else this.speak(`I heard ${cmd}. Try saying: Awaken, Archives, or Close.`);
        };
        rec.start();
    }
};

    {id:'mars',fibIdx:4,name:'Mars',color:0xc1440e,size:2,speed:.4,fact:'The Red Planet — dust storms and the solar system’s tallest volcano.',subNodes:[
      {id:'perseverance',type:'Rover',name:'Perseverance',color:0xffffff,size:.2,orbitDist:2.3,orbitSpeed:0,fact:'Landed Feb 18, 2021 in Jezero Crater.'},
      {id:'ingenuity',type:'Drone',name:'Ingenuity',color:0xeeeeee,size:.1,orbitDist:2.45,orbitSpeed:.15,fact:'First powered flight on another planet.'}]},
    {id:'jupiter',fibIdx:5,name:'Jupiter',color:0xd4a373,size:8.5,speed:.2,fact:'Largest planet — the Great Red Spot dwarfs Earth.'},
    {id:'saturn',fibIdx:6,name:'Saturn',color:0xe6c87c,size:7,speed:.15,hasRing:true,fact:'Rings of ice and rock, dust-sized to house-sized.',subNodes:[
      {id:'cassini',type:'Orbiter',name:'Cassini',color:0xb8c0cc,size:.4,orbitDist:9,orbitSpeed:1.4,fact:'Orbited Saturn 13 years before its final plunge.'},
      {id:'titan',type:'Moon',name:'Titan',color:0xffcc88,size:1.2,orbitDist:19,orbitSpeed:.8,fact:'Rivers and rain — of liquid methane.'}]},
    {id:'uranus',fibIdx:7,name:'Uranus',color:0x7ec8e3,size:4.5,speed:.1,fact:'Spins on its side, axis tilted ~98°.'},
    {id:'neptune',fibIdx:8,name:'Neptune',color:0x3c4edb,size:4.3,speed:.08,fact:'Windiest planet — storms over 2,000 km/h.'},
    {id:'pluto',fibIdx:9,name:'Pluto',color:0xd9cfc6,size:1.2,speed:.05,fact:'Reclassified dwarf planet in 2006.',subNodes:[
      {id:'newhorizons',type:'Probe',name:'New Horizons',color:0xeeeeee,size:.3,orbitDist:3.4,orbitSpeed:4.6,fact:'9.5 years to reach Pluto, then flew on.'}]}
  ],

  MISSIONS:[
    {id:'mars-edl',num:'01',title:'Land a Rover',sub:'Step through Perseverance’s descent to Mars.',target:'mars',finalId:'perseverance',finalOff:{x:.8,y:.4,z:.8},finalHold:3.5,finalCap:'Touchdown — Jezero Crater, Mars',
      stages:[{cam:{x:11,y:7,z:11},look:{x:0,y:0,z:0},dur:3,cap:'Entry Interface — 125 km altitude'},
               {cam:{x:6,y:4,z:6},look:{x:0,y:0,z:0},dur:3,cap:'Parachute Deploy — supersonic to subsonic'},
               {cam:{x:3.2,y:1.8,z:3.2},look:{x:0,y:0,z:0},dur:2.6,cap:'Sky Crane Maneuver — powered descent'}]},
    {id:'pluto-flyby',num:'02',title:'Pluto First Pic',sub:'New Horizons’ historic 2015 flyby.',target:'pluto',finalId:'newhorizons',finalOff:{x:1.3,y:.6,z:1.3},finalHold:3.5,finalCap:'First Clear Images of Pluto — July 14, 2015',
      stages:[{cam:{x:16,y:5,z:0},look:{x:0,y:0,z:0},dur:3,cap:'New Horizons — nine years, 3 billion miles out'},
               {cam:{x:6.5,y:2,z:0},look:{x:0,y:0,z:0},dur:3,cap:'Closest Approach — 12,500 km above the surface'}]}
  ],

  init(){
    const s=this.s, c=document.getElementById('canvas-container');
    s.scene=new THREE.Scene();
    s.camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,60000);
    s.renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,powerPreference:'high-performance'});
    s.renderer.setSize(innerWidth,innerHeight); s.renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    c.appendChild(s.renderer.domElement);
    s.controls=new THREE.OrbitControls(s.camera,s.renderer.domElement);
    s.controls.enableDamping=true; s.controls.dampingFactor=.06; s.controls.minDistance=2; s.controls.maxDistance=16000;
    s.raycaster=new THREE.Raycaster(); s.mouse=new THREE.Vector2();
    s.scene.add(new THREE.AmbientLight(0x14182a,1.1));
    s.scene.add(new THREE.PointLight(0xffeedd,3.2,12000));
    this.starfield(); this.buildCosmos(); this.buildMissionBar(); this.renderPanel();
    c.addEventListener('click',e=>this.onClick(e));
    window.addEventListener('resize',()=>{ s.camera.aspect=innerWidth/innerHeight; s.camera.updateProjectionMatrix(); s.renderer.setSize(innerWidth,innerHeight); });
    requestAnimationFrame(()=>this.loop());
    setTimeout(()=>this.resetCamera(true),300);
  },

  starfield(){
    const pts=[]; for(let i=0;i<4200;i++){ const r=3200+Math.random()*6000, t=Math.random()*Math.PI*2, p=Math.acos(Math.random()*2-1);
      pts.push(r*Math.sin(p)*Math.cos(t), r*Math.cos(p), r*Math.sin(p)*Math.sin(t)); }
    const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
    s.scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x88ccff,size:2.6,transparent:true,opacity:.55})));
  },

  buildCosmos(){
    const s=this.s;
    const sun=new THREE.Mesh(new THREE.SphereGeometry(30,64,64),new THREE.MeshBasicMaterial({color:0xffaa33}));
    sun.userData.body={mesh:sun,data:{id:'sun',name:'Sun',size:30,fact:'A G-type star — 99.8% of the solar system’s mass.'},isSub:false};
    s.scene.add(sun); s.bodies.push(sun.userData.body); this.label(sun,'Sun','planet-label');

    this.COSMIC_DATA.forEach(sys=>{
      const r=s.fib[sys.fibIdx]*s.fibScale;
      const ring=new THREE.Mesh(new THREE.RingGeometry(r-.5,r+.5,128),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.035,side:THREE.DoubleSide}));
      ring.rotation.x=Math.PI/2; s.scene.add(ring);

      const mat=sys.id==='earth' ? new THREE.MeshPhongMaterial({color:sys.color,specular:0x333333,shininess:25}) : new THREE.MeshStandardMaterial({color:sys.color,roughness:.7});
      const pMesh=new THREE.Mesh(new THREE.SphereGeometry(sys.size,32,32),mat);
      if(sys.hasRing){ const sr=new THREE.Mesh(new THREE.RingGeometry(sys.size*1.5,sys.size*3,64),new THREE.MeshBasicMaterial({color:0xe6c87c,side:THREE.DoubleSide,transparent:true,opacity:.5})); sr.rotation.x=Math.PI/2.2; pMesh.add(sr); }
      const a0=Math.random()*Math.PI*2; pMesh.position.set(r*Math.cos(a0),0,r*Math.sin(a0));
      const hit=new THREE.Mesh(new THREE.SphereGeometry(sys.size*3,12,12),new THREE.MeshBasicMaterial({visible:false})); pMesh.add(hit);
      const pBody={mesh:pMesh,hit,data:sys,angle:a0,isSub:false};
      hit.userData.body=pBody; pMesh.userData.body=pBody;
      s.scene.add(pMesh); s.bodies.push(pBody); this.label(pMesh,sys.name,'planet-label');

      (sys.subNodes||[]).forEach(sub=>{
        const geo=sub.type==='Telescope'?new THREE.CylinderGeometry(sub.size,sub.size,sub.size*2,6):sub.type==='Rover'?new THREE.BoxGeometry(sub.size,sub.size,sub.size):new THREE.SphereGeometry(sub.size,16,16);
        const sMesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:sub.color,roughness:.5,metalness:.5}));
        const sHit=new THREE.Mesh(new THREE.SphereGeometry(sub.size*4,8,8),new THREE.MeshBasicMaterial({visible:false})); sMesh.add(sHit);
        s.scene.add(sMesh);
        const sBody={mesh:sMesh,hit:sHit,data:sub,angle:Math.random()*Math.PI*2,isSub:true,parent:pBody};
        sHit.userData.body=sBody; sMesh.userData.body=sBody;
        s.bodies.push(sBody); this.label(sMesh,`${sub.name}`,'mission-label',true);
      });
    });
  },

  loop(){
    requestAnimationFrame(()=>this.loop());
    const s=this.s;
    s.bodies.forEach(b=>{
      if(b.data.id==='sun') return;
      if(!b.isSub){ b.angle-=b.data.speed*.001; const r=s.fib[b.data.fibIdx]*s.fibScale; b.mesh.position.x=r*Math.cos(b.angle); b.mesh.position.z=r*Math.sin(b.angle); b.mesh.rotation.y+=.005; }
      else{ const p=b.parent.mesh; b.angle+=b.data.orbitSpeed*.01; b.mesh.position.x=p.position.x+b.data.orbitDist*Math.cos(b.angle); b.mesh.position.z=p.position.z+b.data.orbitDist*Math.sin(b.angle); b.mesh.position.y=p.position.y+Math.sin(b.angle)*(b.data.orbitDist*.2); b.mesh.rotation.x+=.01; }
    });
    if(s.focused && !s.zooming){ const t=new THREE.Vector3(); s.focused.mesh.getWorldPosition(t); s.controls.target.lerp(t,.1); }
    this.updateLabels(); s.controls.update(); s.renderer.render(s.scene,s.camera);
  },

  label(mesh,name,cls,isMission){
    const div=document.createElement('div'); div.className=`html-label ${cls}`; div.textContent=name;
    document.getElementById('labels-container').appendChild(div);
    this.s.labels.push({mesh,el:div,isMission:!!isMission});
  },

  updateLabels(){
    const s=this.s, v=new THREE.Vector3();
    s.labels.forEach(l=>{
      l.mesh.getWorldPosition(v); const dist=s.camera.position.distanceTo(v); v.project(s.camera);
      if(v.z>1||v.z<-1){ l.el.style.opacity=0; return; }
      let op=1;
      if(s.focused){
        const inSys=l.mesh===s.focused.mesh || (s.focused.isSub && l.mesh===s.focused.parent.mesh) || (!s.focused.isSub && l.isMission && l.mesh.userData.body && l.mesh.userData.body.parent===s.focused);
        if(!inSys && !l.isMission) op=.12;
        if(l.isMission && dist>220) op=0;
      } else { if(dist>5200) op=0; if(l.isMission) op=0; }
      l.el.style.opacity=op;
      const x=(v.x*.5+.5)*innerWidth, y=(v.y*-.5+.5)*innerHeight;
      l.el.style.transform=`translate(-50%,-50%) translate(${x}px, ${y-(l.isMission?14:34)}px)`;
    });
  },

  onClick(e){
    const s=this.s; s.mouse.x=(e.clientX/innerWidth)*2-1; s.mouse.y=-(e.clientY/innerHeight)*2+1;
    s.raycaster.setFromCamera(s.mouse,s.camera);
    const hits=s.raycaster.intersectObjects(s.bodies.map(b=>b.hit||b.mesh));
    if(hits.length){ const body=hits[0].object.userData.body; if(body) this.selectBody(body); }
  },

  fly(camP,lookP,dur=2.4,ease='power3.inOut',cb){
    gsap.to(this.s.camera.position,{...camP,duration:dur,ease});
    gsap.to(this.s.controls.target,{...lookP,duration:dur,ease,onComplete:cb});
  },

  selectBody(body){
    this.s.focused=body; this.s.zooming=true;
    const t=new THREE.Vector3(); body.mesh.getWorldPosition(t);
    const o=body.data.camOffset || (body.isSub ? {x:body.data.size*6+2,y:body.data.size*3+1,z:body.data.size*6+2} : {x:body.data.size*6+15,y:body.data.size*3+7.5,z:body.data.size*6+15});
    this.fly({x:t.x+o.x,y:t.y+o.y,z:t.z+o.z},{x:t.x,y:t.y,z:t.z},2.4,'power3.inOut',()=>this.s.zooming=false);
    this.s.stack = body.data.id==='sun' ? ['root'] : body.isSub ? ['root',body.parent.data.id] : ['root',body.data.id];
    this.renderPanel(body);
  },

  resetCamera(initial){
    const s=this.s; s.focused=null; s.zooming=true; s.stack=['root']; this.renderPanel();
    const d=s.fib[9]*s.fibScale, dur=initial?.1:2.6;
    this.fly({x:0,y:d*.6,z:d*.85},{x:0,y:0,z:0},dur,'power3.inOut',()=>s.zooming=false);
  },

  togglePanel(){
    this.s.panelOpen=!this.s.panelOpen;
    document.getElementById('panel').classList.toggle('collapsed',!this.s.panelOpen);
    document.getElementById('panel-toggle').textContent=this.s.panelOpen?'\u203A':'\u2039';
  },

  findPlanet(id){ return this.COSMIC_DATA.find(p=>p.id===id); },

  renderPanel(active){
    const stack=this.s.stack, list=document.getElementById('panel-list');
    if(stack.length===1){
      list.innerHTML = this.COSMIC_DATA.map(p=>`<div class="row" onclick="A.selectById('${p.id}')"><div><div class="rname">${p.name}</div><div class="rtype">Planet</div></div><div>${p.subNodes?'\u203A':''}</div></div>`).join('');
    } else {
      const planet=this.findPlanet(stack[1]);
      list.innerHTML = (planet.subNodes&&planet.subNodes.length) ? planet.subNodes.map(sub=>`<div class="row ${active&&active.data.id===sub.id?'active':''}" onclick="A.selectById('${sub.id}')"><div><div class="rname">${sub.name}</div><div class="rtype">${sub.type}</div></div></div>`).join('')
        : `<div class="row" style="cursor:default;"><div class="rtype" style="opacity:.6;">No tracked moons or missions yet</div></div>`;
    }
  },
  selectById(id){ const body=this.s.bodies.find(b=>b.data.id===id); if(body) this.selectBody(body); },

  buildMissionBar(){
    document.getElementById('mission-bar').innerHTML = this.MISSIONS.map(m=>
      `<div class="mcard" onclick="A.playMission('${m.id}')"><div class="num mono">${m.num}</div><div class="mtitle disp">${m.title}</div><div class="msub">${m.sub}</div></div>`).join('');
  },

  async playMission(id){
    const m=this.MISSIONS.find(x=>x.id===id); if(!m) return;
    const baseMesh=this.s.bodies.find(b=>b.data.id===m.target).mesh, base=new THREE.Vector3(); baseMesh.getWorldPosition(base);
    const tl=gsap.timeline({onComplete:()=>{}}); 

    m.stages.forEach(st=>{
      const camP=base.clone().add(new THREE.Vector3(st.cam.x,st.cam.y,st.cam.z));
      const lookP=base.clone().add(new THREE.Vector3(st.look.x,st.look.y,st.look.z));
      tl.to(this.s.camera.position,{...camP,duration:st.dur,ease:'power2.inOut'});
      tl.to(this.s.controls.target,{...lookP,duration:st.dur,ease:'power2.inOut'},'<');
    });

    if(m.finalId){
      const finalMesh=this.s.bodies.find(b=>b.data.id===m.finalId).mesh;
      tl.call(()=>{
        const fp=finalMesh.position.clone(), camP=fp.clone().add(new THREE.Vector3(m.finalOff.x,m.finalOff.y,m.finalOff.z));
        gsap.to(this.s.camera.position,{...camP,duration:2.4,ease:'power2.inOut'});
        gsap.to(this.s.controls.target,{...fp,duration:2.4,ease:'power2.inOut'});
      });
    }
  }
};

// ==========================================
// 4. INITIALIZATION
// ==========================================
window.onload = () => {
    A.init();
    DP.init();
};
</script>

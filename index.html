<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Khel.o | The Sahyogi Patch</title>
<style>
    :root { --bg: #0a0a0f; --surface: rgba(255,255,255,0.05); --accent: #fbbf24; --text: #fff; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; perspective: 1500px; }

    /* Jumbling Logo */
    .logo { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; font-weight: 800; color: var(--accent); letter-spacing: 2px; text-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }

    /* 3D Dodecahedron / Cylinder Wheel */
    .wheel-container { width: 100%; height: 60vh; display: flex; align-items: center; justify-content: center; position: relative; }
    .wheel { width: 200px; height: 260px; position: relative; transform-style: preserve-3d; transform: rotateX(-10deg) rotateY(0deg); transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1); }
    
    .face {
        position: absolute; width: 180px; height: 240px; left: 10px; top: 10px;
        background: var(--surface); backdrop-filter: blur(15px);
        border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 20px; text-align: center; backface-visibility: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.3s;
    }
    .face:hover { border-color: var(--accent); transform: scale(1.05); }
    
    /* 12 Faces Geometry (360 / 12 = 30deg, Radius = 330px) */
    .face:nth-child(1)  { transform: rotateY(0deg) translateZ(330px); }
    .face:nth-child(2)  { transform: rotateY(30deg) translateZ(330px); }
    .face:nth-child(3)  { transform: rotateY(60deg) translateZ(330px); }
    .face:nth-child(4)  { transform: rotateY(90deg) translateZ(330px); }
    .face:nth-child(5)  { transform: rotateY(120deg) translateZ(330px); }
    .face:nth-child(6)  { transform: rotateY(150deg) translateZ(330px); }
    .face:nth-child(7)  { transform: rotateY(180deg) translateZ(330px); }
    .face:nth-child(8)  { transform: rotateY(210deg) translateZ(330px); }
    .face:nth-child(9)  { transform: rotateY(240deg) translateZ(330px); }
    .face:nth-child(10) { transform: rotateY(270deg) translateZ(330px); }
    .face:nth-child(11) { transform: rotateY(300deg) translateZ(330px); }
    .face:nth-child(12) { transform: rotateY(330deg) translateZ(330px); }

    .tile-icon { font-size: 3rem; margin-bottom: 10px; }
    .tile-type { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 8px; font-weight: 700; }
    .tile-title { font-size: 1rem; font-weight: 600; line-height: 1.3; margin-bottom: 15px; flex-grow: 1; display: flex; align-items: center; }
    .tile-link { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 20px; color: #fff; text-decoration: none; font-size: 0.8rem; font-weight: 600; width: 100%; text-align: center; transition: 0.2s; }
    .tile-link:hover { background: var(--accent); color: #000; }

    /* 5W1H Dice */
    .dice-btn {
        position: absolute; bottom: 40px; width: 70px; height: 70px; border-radius: 50%;
        background: linear-gradient(135deg, #fbbf24, #f59e0b); border: none;
        color: #000; font-size: 2rem; cursor: pointer; box-shadow: 0 10px 30px rgba(251, 191, 36, 0.4);
        display: flex; align-items: center; justify-content: center; transition: 0.3s;
    }
    .dice-btn:active { transform: scale(0.9); }
    .dice-btn.rolling { animation: roll 0.6s linear infinite; }
    @keyframes roll { 100% { transform: rotate(360deg); } }

    /* Voice & Status Overlay */
    .status { position: absolute; bottom: 120px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; font-size: 0.9rem; opacity: 0; transition: 0.5s; max-width: 80%; text-align: center; backdrop-filter: blur(10px); }
    .status.show { opacity: 1; }

    /* Embed Snippet */
    .embed-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px; color: #fff; font-size: 0.8rem; cursor: pointer; }
</style>
</head>
<body>

<div class="logo">KHEL.O</div>
<button class="embed-btn" onclick="alert('Embed Code:\n<iframe src=&quot;https://your-server.com/index.html&quot; width=&quot;300&quot; height=&quot;500&quot; frameborder=&quot;0&quot;></iframe>')">🔗 Embed Patch</button>

<div class="wheel-container">
    <div class="wheel" id="wheel">
        <!-- 12 Faces populated by JS -->
    </div>
</div>

<div class="status" id="status">Roll the dice to explore...</div>
<button class="dice-btn" id="diceBtn" onclick="rollDice()">🎲</button>

<script>
    const wheel = document.getElementById('wheel');
    const status = document.getElementById('status');
    const diceBtn = document.getElementById('diceBtn');
    
    const intents = ["What", "Why", "Where", "When", "Who", "How"];
    const jumbles = ["khel.o", "ba.che", "kri.shi", "ka.li", "mu.kti", "sa.hyog"];
    const keywords = ["water", "soil", "energy", "community", "mind", "nature"];

    let currentRotation = 0;

    // Drag to rotate the wheel
    let isDragging = false, startX = 0, startRot = 0;
    wheel.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX; startRot = currentRotation; });
    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const delta = e.clientX - startX;
        currentRotation = startRot + delta * 0.5;
        wheel.style.transform = `rotateX(-10deg) rotateY(${currentRotation}deg)`;
    });
    window.addEventListener('mouseup', () => isDragging = false);

    async function rollDice() {
        diceBtn.classList.add('rolling');
        status.innerText = "Jumbling the cosmos...";
        status.classList.add('show');

        const intent = intents[Math.floor(Math.random() * intents.length)];
        const jumble = jumbles[Math.floor(Math.random() * jumbles.length)];
        const keyword = keywords[Math.floor(Math.random() * keywords.length)];

        // Spin wheel rapidly
        currentRotation += 720;
        wheel.style.transform = `rotateX(-10deg) rotateY(${currentRotation}deg)`;

        try {
            const res = await fetch('/api/query', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ intent, keywords: keyword, jumble })
            });
            const data = await res.json();
            
            renderTiles(data.tiles);
            
            // Speak the voice message using Browser TTS (Zero API cost, instant)
            if (data.voiceMsg && 'speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(data.voiceMsg);
                utterance.rate = 0.9;
                speechSynthesis.speak(utterance);
            }

            status.innerText = `${intent} ${jumble} ${keyword}`;
        } catch (err) {
            status.innerText = "Connection lost. Retrying...";
        } finally {
            diceBtn.classList.remove('rolling');
        }
    }

    function renderTiles(tiles) {
        wheel.innerHTML = '';
        tiles.forEach((tile, i) => {
            const typeColor = { product: '#10b981', book: '#3b82f6', event: '#f59e0b', fact: '#8b5cf6' };
            const face = document.createElement('div');
            face.className = 'face';
            face.innerHTML = `
                <div class="tile-icon">${tile.icon}</div>
                <div class="tile-type" style="color: ${typeColor[tile.id[0]] || '#fff'}">${tile.id[0].toUpperCase()}</div>
                <div class="tile-title">${tile.title}</div>
                <a href="${tile.link}" target="_blank" class="tile-link">Explore →</a>
            `;
            wheel.appendChild(face);
        });
        
        // Reset rotation to show first tile
        currentRotation = 0;
        wheel.style.transform = `rotateX(-10deg) rotateY(0deg)`;
    }

    // Initial load
    window.onload = () => {
        status.innerText = "Welcome to Khel.o. Roll the dice.";
        status.classList.add('show');
    };
</script>
</body>
</html>

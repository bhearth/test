<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Khel.o · Infinite Knowledge OS</title>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#010204;color:#e2e8f0;font-family:'Space Grotesk',system-ui,sans-serif;overflow:hidden;height:100dvh;width:100dvw}

/* ── HUD & TOOLBAR ── */
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:clamp(12px,3vw,20px);pointer-events:none;z-index:50;background:linear-gradient(180deg,rgba(1,2,4,0.92) 60%,transparent)}
.telemetry{font-size:clamp(10px,2.5vw,13px);letter-spacing:3px;text-transform:uppercase;color:#38bdf8;text-shadow:0 0 10px rgba(56,189,248,0.6);font-weight:500}
.coords{font-size:clamp(9px,2vw,11px);color:#94a3b8;text-align:right;letter-spacing:2px}
.hint{font-size:clamp(8px,1.8vw,10px);color:#475569;letter-spacing:1px}
#toolbar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:space-around;align-items:center;padding:clamp(8px,2.5vw,14px) 8px clamp(14px,4vw,26px);background:linear-gradient(0deg,rgba(1,2,4,0.97) 75%,transparent);z-index:50;gap:6px;pointer-events:auto;touch-action:auto}
.tb{display:flex;flex-direction:column;align-items:center;gap:3px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:10px 14px;cursor:pointer;flex:1;max-width:90px;transition:.2s}
.tb:active{background:rgba(255,255,255,0.12);transform:scale(0.93)}
.tb .em{font-size:clamp(22px,6vw,30px);line-height:1}
.tb .lb{font-size:clamp(8px,2vw,10px);color:#64748b;letter-spacing:.5px;text-transform:uppercase;font-weight:700}

/* ── SETTINGS MODAL ── */
#settings-modal{position:fixed;inset:0;background:rgba(1,2,4,.95);backdrop-filter:blur(20px);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:20px}
#settings-modal.active{display:flex}
.modal-box{background:rgba(15,23,42,0.8);border:1px solid rgba(56,189,248,0.2);border-radius:24px;padding:30px;width:90%;max-width:400px;text-align:center}
.modal-box h2{color:#38bdf8;font-size:20px;margin-bottom:10px;letter-spacing:2px}
.modal-box p{color:#64748b;font-size:12px;margin-bottom:20px}
.modal-box select, .modal-box input{width:100%;padding:12px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;margin-bottom:15px;font-family:monospace;outline:none}
.modal-box button{width:100%;padding:14px;background:linear-gradient(135deg,#38bdf8,#818cf8);border:none;border-radius:12px;color:#fff;font-weight:700;cursor:pointer;font-size:14px;letter-spacing:1px}

/* ── 3D VIEWPORT (Hammer.js Target) ── */
#viewport{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;overflow:hidden}
#hub{position:absolute;top:50%;left:50%;transform-style:preserve-3d;will-change:transform}
svg{position:absolute;top:-10000px;left:-10000px;width:20000px;height:20000px;pointer-events:none;transform-style:preserve-3d}
.stellar-path{fill:none;stroke-width:1.5;stroke-linecap:round;filter:drop-shadow(0 0 4px currentColor);stroke-dasharray:2000;stroke-dashoffset:2000;animation:spark 1.4s cubic-bezier(.25,1,.5,1) forwards}
@keyframes spark{to{stroke-dashoffset:0}}

/* ── NODES (Levels 1-5) ── */
.seed-dot{position:absolute;width:80px;height:80px;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:50%}
.seed-dot::after{content:'';position:absolute;width:20px;height:20px;background:#d4af37;border-radius:50%;box-shadow:0 0 40px 16px rgba(212,175,55,.7);animation:breath 3s infinite ease-in-out}
@keyframes breath{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.5);opacity:1}}

.jnode{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;text-align:center;background:rgba(10,15,25,0.8);border:1.5px solid;backdrop-filter:blur(10px);transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),var(--z)) scale(0);animation:supernova .9s cubic-bezier(.34,1.56,.64,1) forwards;will-change:transform}
.jnode:active{background:currentColor!important;color:#000!important;box-shadow:0 0 30px currentColor;z-index:500}
.jnode .ji{font-size:clamp(18px,5vw,28px);filter:drop-shadow(0 2px 5px rgba(0,0,0,.8))}
.jnode .jl{font-size:clamp(7px,1.8vw,10px);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:5px;pointer-events:none}
@keyframes supernova{to{transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),var(--z)) scale(1)}}

/* ── RICH MEDIA CARDS (Level 6 - AI Generated) ── */
.media-card{position:absolute;width:180px;height:120px;border-radius:16px;cursor:pointer;overflow:hidden;transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),var(--z)) scale(0);animation:cardPop 1s cubic-bezier(.34,1.56,.64,1) forwards;box-shadow:0 10px 30px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);background:#0f172a;display:flex;flex-direction:column;justify-content:flex-end}
@keyframes cardPop{to{transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),var(--z)) scale(1)}}
.media-card:active{transform:translate3d(calc(-50% + var(--x)),calc(-50% + var(--y)),calc(var(--z) + 40px)) scale(1.1)!important}
.card-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.4;transition:0.3s}
.media-card:active .card-bg{opacity:0.7}
.card-content{position:relative;z-index:2;padding:12px;background:linear-gradient(transparent,rgba(0,0,0,0.9))}
.card-type{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.card-title{font-size:12px;font-weight:600;color:#fff;line-height:1.3}
.type-yt .card-type{color:#ff0000}
.type-book .card-type{color:#fbbf24}
.type-web .card-type{color:#38bdf8}

/* ── VIEWER MODE (Modal) ── */
#viewer{position:fixed;inset:0;background:rgba(1,2,4,.98);backdrop-filter:blur(20px);z-index:400;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#viewer.active{display:flex}
.viewer-card{background:rgba(15,23,42,0.9);border:1px solid rgba(56,189,248,0.3);border-radius:24px;padding:30px;width:90%;max-width:400px;text-align:center}
.viewer-icon{font-size:60px;margin-bottom:15px}
.viewer-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:10px}
.viewer-desc{font-size:14px;color:#94a3b8;line-height:1.6;margin-bottom:25px}
.viewer-btn{display:block;width:100%;padding:16px;background:linear-gradient(135deg,#38bdf8,#818cf8);border:none;border-radius:16px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;margin-bottom:10px}
.viewer-close{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#94a3b8}

/* ── LOADING WARP ── */
#loader{position:fixed;inset:0;background:rgba(1,2,4,.9);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column;gap:15px}
#loader.active{display:flex}
.loader-ring{width:50px;height:50px;border:2px solid transparent;border-top-color:#38bdf8;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:11px;letter-spacing:3px;color:#38bdf8;text-transform:uppercase}
</style>
</head>
<body>

<!-- SETTINGS MODAL -->
<div id="settings-modal">
  <div class="modal-box">
    <h2>⚙️ AI ENGINE</h2>
    <p>Connect to the Knowledge Universe. (Zero tokens used for first 5 clicks)</p>
    <select id="sel-provider">
      <option value="demo">Demo Mode (No API)</option>
      <option value="openrouter">OpenRouter (Qwen/Claude/Llama)</option>
      <option value="groq">Groq (Fast & Free)</option>
    </select>
    <input type="password" id="inp-key" placeholder="Paste API Key (Optional for Demo)">
    <button onclick="saveSettings()">ACTIVATE ENGINE</button>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="telemetry">
    <div id="status">✨ Touch the Golden Seed</div>
    <div id="ai-tag" style="font-size:9px;color:#334155;margin-top:3px">ENGINE: DEMO</div>
  </div>
  <div class="coords">
    <div id="coord-display">Z: 1.000</div>
    <div class="hint" onclick="document.getElementById('settings-modal').classList.add('active')" style="cursor:pointer;color:#38bdf8">⚙️ SETTINGS</div>
  </div>
</div>

<!-- 3D VIEWPORT -->
<div id="viewport"><div id="hub"><svg id="lines"></svg></div></div>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="tb" onclick="resetUniverse()"><span class="em">🌱</span><span class="lb">Seed</span></div>
  <div class="tb" onclick="rollSurprise()"><span class="em">🎲</span><span class="lb">Dice</span></div>
  <div class="tb" onclick="document.getElementById('settings-modal').classList.add('active')"><span class="em">⚙️</span><span class="lb">AI</span></div>
</div>

<!-- VIEWER MODE -->
<div id="viewer">
  <div class="viewer-card">
    <div class="viewer-icon" id="v-icon">📺</div>
    <div class="viewer-title" id="v-title">Resource Title</div>
    <div class="viewer-desc" id="v-desc">Description goes here.</div>
    <a href="#" target="_blank" class="viewer-btn" id="v-link">OPEN RESOURCE</a>
    <button class="viewer-btn viewer-close" onclick="closeViewer()">BACK TO UNIVERSE</button>
  </div>
</div>

<!-- LOADER -->
<div id="loader"><div class="loader-ring"></div><div class="loader-text">Querying AI Universe...</div></div>

<script>
// ═══════════════════════════════════════════════════════
//  CONFIG & STATE
// ═══════════════════════════════════════════════════════
let CFG = JSON.parse(localStorage.getItem('khelo_cfg') || '{"provider":"demo","key":""}');
const PROVIDERS = {
  demo: { url: null, model: 'demo' },
  openrouter: { url: 'https://openrouter.ai/api/v1/chat/completions', model: 'qwen/qwen-2.5-72b-instruct' },
  groq: { url: 'https://api.groq.com/openai/v1/chat/completions', model: 'llama-3.1-70b-versatile' }
};

function saveSettings() {
  CFG.provider = document.getElementById('sel-provider').value;
  CFG.key = document.getElementById('inp-key').value;
  localStorage.setItem('khelo_cfg', JSON.stringify(CFG));
  document.getElementById('settings-modal').classList.remove('active');
  document.getElementById('ai-tag').innerText = `ENGINE: ${CFG.provider.toUpperCase()}`;
}

// ═══════════════════════════════════════════════════════
//  ZERO-TOKEN LOCAL TREE (Clicks 1 to 5)
// ═══════════════════════════════════════════════════════
const LOCAL_TREE = {
  "Root": ["Self 👤", "World 🌍", "Action 💡"],
  "Self 👤": ["Mind 🧠", "Body 🫀", "Skill 🛠️"],
  "World 🌍": ["Nature 🌱", "Society 🤝", "Tech 🚀"],
  "Action 💡": ["Create 🎨", "Connect 🌐", "Give 🤲"]
};

const DIMENSIONS = ["Origins", "Impact", "Future", "Ethics", "Science", "Art", "Community", "History"];
function getChildren(name, level, path) {
  if (level === 0) return LOCAL_TREE["Root"];
  if (LOCAL_TREE[name]) return LOCAL_TREE[name];
  
  // Procedural infinite expansion
  const avail = DIMENSIONS.filter(d => !path.includes(d));
  const picked = [];
  while(picked.length < 3 && avail.length > 0) {
    picked.push(avail.splice(Math.floor(Math.random() * avail.length), 1)[0]);
  }
  return picked.map(d => `${name.split(' ')[0]} ${d}`);
}

// ═══════════════════════════════════════════════════════
//  AI ENGINE (Triggered ONLY at Level 6)
// ═══════════════════════════════════════════════════════
const aiCache = new Map();
async function fetchAIResources(concept) {
  if (aiCache.has(concept)) return aiCache.get(concept);
  if (CFG.provider === 'demo') {
    // Mock data for Demo Mode
    const mock = [
      {t:'yt', n:`${concept} Documentary`, u:'https://youtube.com', d:'A deep dive into the concept.'},
      {t:'book', n:`The Book of ${concept}`, u:'https://openlibrary.org', d:'Essential reading on the topic.'},
      {t:'web', n:`${concept} Community`, u:'https://wikipedia.org', d:'Global network of learners.'}
    ];
    aiCache.set(concept, mock);
    return mock;
  }

  // Token-Optimized Prompt (~50 tokens)
  const prompt = `Topic:"${concept}". Return 3 real resources (1 YouTube, 1 Book, 1 Web). STRICT JSON array only. No markdown. Format:[{"t":"yt|book|web","n":"Title","u":"https://...","d":"10 words"}]`;
  
  try {
    const res = await fetch(PROVIDERS[CFG.provider].url, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization':`Bearer ${CFG.key}`},
      body: JSON.stringify({
        model: PROVIDERS[CFG.provider].model,
        messages: [{role:'user', content:prompt}],
        temperature: 0.7, max_tokens: 200
      })
    });
    const data = await res.json();
    let text = data.choices[0].message.content.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(text);
    aiCache.set(concept, parsed);
    return parsed;
  } catch (e) {
    console.error(e);
    return [{t:'web', n:'Error fetching', u:'#', d:'Check API key'}];
  }
}

// ═══════════════════════════════════════════════════════
//  3D ENGINE & HAMMER.JS
// ═══════════════════════════════════════════════════════
const hub = document.getElementById('hub');
const svg = document.getElementById('lines');
const SVG_O = 10000;
let cam = {x:0,y:0,z:1,rx:0,ry:0};
let tgt = {x:0,y:0,z:1,rx:0,ry:0};
let nodes = [];

// Hammer.js strictly on viewport
const mc = new Hammer.Manager(document.getElementById('viewport'));
mc.add(new Hammer.Pan({ direction: Hammer.DIRECTION_ALL, threshold: 0 }));
mc.add(new Hammer.Pinch({ enable: true }));
mc.add(new Hammer.Tap({ event: 'doubletap', taps: 2 }));
mc.get('pinch').recognizeWith(mc.get('pan'));

let isPanning = false, lastPanX = 0, lastPanY = 0, pinchStart = 1;

mc.on('panstart', e => { isPanning = true; lastPanX = e.center.x; lastPanY = e.center.y; });
mc.on('panmove', e => {
  if (!isPanning) return;
  const dx = e.center.x - lastPanX, dy = e.center.y - lastPanY;
  if (e.pointers.length >= 2) { tgt.ry += dx * 0.4; tgt.rx -= dy * 0.4; } // 3D Tilt
  else { tgt.x += dx / cam.z; tgt.y += dy / cam.z; } // Pan
  lastPanX = e.center.x; lastPanY = e.center.y;
});
mc.on('panend', () => isPanning = false);
mc.on('pinchstart', () => pinchStart = tgt.z);
mc.on('pinch', e => { tgt.z = Math.max(0.1, Math.min(5, pinchStart * e.scale)); });
mc.on('doubletap', () => resetUniverse());

// Mouse wheel for desktop
document.getElementById('viewport').addEventListener('wheel', e => {
  tgt.z = Math.max(0.1, Math.min(5, tgt.z - e.deltaY * 0.001));
}, {passive:true});

function lerp(a,b,t){return a+(b-a)*t}
function renderLoop() {
  cam.x=lerp(cam.x,tgt.x,0.08); cam.y=lerp(cam.y,tgt.y,0.08);
  cam.z=lerp(cam.z,tgt.z,0.08); cam.rx=lerp(cam.rx,tgt.rx,0.08); cam.ry=lerp(cam.ry,tgt.ry,0.08);
  hub.style.transform = `translate(-50%,-50%) scale(${cam.z}) translate3d(${cam.x}px,${cam.y}px,0) rotateX(${cam.rx}deg) rotateY(${cam.ry}deg)`;
  document.getElementById('coord-display').innerText = `Z:${cam.z.toFixed(3)}`;
  requestAnimationFrame(renderLoop);
}

// ═══════════════════════════════════════════════════════
//  SPAWN LOGIC (Infinite Recursion)
// ═══════════════════════════════════════════════════════
function spawnNode(px, py, pz, name, level, index, total, path) {
  const angle = (index / total) * Math.PI * 2 + (level * 0.5);
  const radius = level === 0 ? 0 : (level === 1 ? 350 : 200);
  const x = px + Math.cos(angle) * radius;
  const y = py + Math.sin(angle) * radius;
  const z = pz + Math.sin(level + index) * 80;

  // Draw Link
  const pathEl = document.createElementNS("http://www.w3.org/2000/svg","path");
  pathEl.setAttribute("d",`M${px+SVG_O} ${py+SVG_O} Q${(px+x)/2+SVG_O} ${(py+y)/2+SVG_O} ${x+SVG_O} ${y+SVG_O}`);
  pathEl.setAttribute("class","stellar-path");
  pathEl.style.stroke = `hsl(${level*40 + index*30}, 70%, 60%)`;
  pathEl.style.strokeOpacity = 0.4;
  svg.appendChild(pathEl);

  const el = document.createElement('div');
  el.className = 'jnode';
  const sz = Math.max(50, 90 - level * 10);
  el.style.cssText = `--x:${x}px;--y:${y}px;--z:${z}px;width:${sz}px;height:${sz}px;color:hsl(${level*40 + index*30}, 70%, 60%);border-color:currentColor;animation-delay:${index*0.1}s`;
  el.innerHTML = `<div class="ji">${name.split(' ').pop()}</div><div class="jl">${name.split(' ')[0]}</div>`;
  
  el.onclick = async (e) => {
    e.stopPropagation();
    tgt.x = -x; tgt.y = -y; tgt.z = 1.5;
    
    if (level >= 5) {
      // LEVEL 6: TRIGGER AI & SHOW MEDIA CARDS
      document.getElementById('loader').classList.add('active');
      document.getElementById('status').innerText = `🔮 AI: Mapping ${name}...`;
      const resources = await fetchAIResources(name);
      document.getElementById('loader').classList.remove('active');
      spawnMediaCards(x, y, z, resources);
    } else {
      // LEVEL 1-5: LOCAL EXPANSION
      const children = getChildren(name, level, path);
      children.forEach((c, i) => spawnNode(x, y, z, c, level + 1, i, children.length, [...path, name]));
    }
  };

  hub.appendChild(el);
  nodes.push(el);
}

function spawnMediaCards(px, py, pz, resources) {
  resources.forEach((r, i) => {
    const angle = (i / resources.length) * Math.PI * 2;
    const x = px + Math.cos(angle) * 250;
    const y = py + Math.sin(angle) * 250;
    const z = pz + 100;

    const el = document.createElement('div');
    el.className = `media-card type-${r.t}`;
    el.style.cssText = `--x:${x}px;--y:${y}px;--z:${z}px;animation-delay:${i*0.2}s`;
    
    const icon = r.t === 'yt' ? '📺' : r.t === 'book' ? '📚' : '🌐';
    const typeName = r.t === 'yt' ? 'YOUTUBE' : r.t === 'book' ? 'BOOK' : 'WEB';
    
    el.innerHTML = `
      <div class="card-bg" style="background:hsl(${i*120}, 50%, 20%)"></div>
      <div class="card-content">
        <div class="card-type">${icon} ${typeName}</div>
        <div class="card-title">${r.n}</div>
      </div>
    `;
    
    el.onclick = (e) => {
      e.stopPropagation();
      openViewer(r, icon);
    };
    
    hub.appendChild(el);
  });
}

function openViewer(r, icon) {
  document.getElementById('v-icon').innerText = icon;
  document.getElementById('v-title').innerText = r.n;
  document.getElementById('v-desc').innerText = r.d;
  document.getElementById('v-link').href = r.u;
  document.getElementById('viewer').classList.add('active');
}
function closeViewer() { document.getElementById('viewer').classList.remove('active'); }

function resetUniverse() {
  nodes.forEach(n => n.remove());
  nodes = [];
  svg.innerHTML = '';
  cam = {x:0,y:0,z:1,rx:0,ry:0};
  tgt = {x:0,y:0,z:1,rx:0,ry:0};
  
  const seed = document.createElement('div');
  seed.className = 'seed-dot';
  seed.onclick = (e) => {
    e.stopPropagation();
    seed.remove();
    const roots = getChildren("Root", 0, []);
    roots.forEach((r, i) => spawnNode(0, 0, 0, r, 1, i, roots.length, ["Root"]));
    document.getElementById('status').innerText = "🌌 Navigating Knowledge...";
  };
  hub.appendChild(seed);
  document.getElementById('status').innerText = "✨ Touch the Golden Seed";
}

function rollSurprise() {
  resetUniverse();
  setTimeout(() => {
    const seed = hub.querySelector('.seed-dot');
    if(seed) seed.click();
  }, 500);
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
document.getElementById('sel-provider').value = CFG.provider;
document.getElementById('inp-key').value = CFG.key;
document.getElementById('ai-tag').innerText = `ENGINE: ${CFG.provider.toUpperCase()}`;
resetUniverse();
renderLoop();
</script>
</body>
</html>
